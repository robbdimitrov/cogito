syntax = "proto3";

package cogito;
option go_package = "./genproto";

// Users

message CreateUserRequest {
  string name = 1;
  string username = 2;
  string email = 3;
  string password = 4;
}

message Identifier {
  int32 id = 1;
}

message Ids {
  repeated int32 ids = 1;
}

message UserRequest {
  int32 user_id = 1;
}

message User {
  int32 id = 1;
  string name = 2;
  string username = 3;
  string email = 4;
  string bio = 5;
  int32 posts = 6;
  int32 likes = 7;
  int32 following = 8;
  int32 followers = 9;
  bool followed = 10;
  string created = 11;
  string profile_photo_key = 12;
  string cover_photo_key = 13;
  int32 replies = 14;
}

message UpdateUserRequest {
  optional string name = 1;
  optional string username = 2;
  optional string email = 3;
  string password = 4;
  string old_password = 5;
  optional string bio = 6;
  optional string profile_photo_key = 7;
  optional string cover_photo_key = 8;
}

message GetUsersRequest {
  int32 user_id = 1;
  string cursor = 2;
  int32 limit = 3;
}

message Users {
  repeated User users = 1;
  string next_cursor = 2;
}

message GetUserByUsernameRequest {
  string username = 1;
}

service UserService {
  rpc CreateUser(CreateUserRequest) returns (Identifier);
  rpc GetUser(UserRequest) returns (User);
  rpc GetUserByUsername(GetUserByUsernameRequest) returns (User);
  rpc GetUsersByIds(Ids) returns (Users);
  rpc UpdateUser(UpdateUserRequest) returns (Empty);
  rpc GetFollowing(GetUsersRequest) returns (Users);
  rpc GetFollowers(GetUsersRequest) returns (Users);
  rpc FollowUser(UserRequest) returns (Empty);
  rpc UnfollowUser(UserRequest) returns (Empty);
}

// Sessions

message Empty {}

message Credentials {
  string email = 1;
  string password = 2;
}

message SessionRequest {
  string session_id = 1;
}

message Session {
  string id = 1;
  int32 user_id = 2;
  string created = 3;
  string handle = 4;
}

message Sessions {
  repeated Session sessions = 1;
}

service AuthService {
  rpc CreateSession(Credentials) returns (Session);
  rpc GetSession(SessionRequest) returns (Session);
  rpc DeleteSession(SessionRequest) returns (Empty);
  rpc GetSessions(UserRequest) returns (Sessions);
}

// Posts

message CreatePostRequest {
  string content = 1;
  optional string media_key = 2;
  optional int32 in_reply_to_id = 3;
  optional int32 quote_of_id = 4;
  optional string in_reply_to_public_id = 5;
  optional string quote_of_public_id = 6;
}

message PostIdentifier {
  string public_id = 1;
}

message PostRequest {
  int32 post_id = 1;
  string public_id = 2;
}

message Post {
  int32 id = 1;
  int32 user_id = 2;
  string content = 3;
  int32 likes = 4;
  bool liked = 5;
  int32 reposts = 6;
  bool reposted = 7;
  string created = 8;
  optional int32 repost_of_id = 9;
  reserved 10;
  string media_key = 11;
  int32 replies = 12;
  int32 in_reply_to_id = 13;
  int32 quote_of_id = 14;
  Post quote_post = 15;
  Post repost_of = 16;
  string public_id = 17;
  optional string repost_of_public_id = 18;
}

message GetFeedRequest {
  string cursor = 1;
  int32 limit = 2;
}

message Posts {
  repeated Post posts = 1;
  string next_cursor = 2;
}

message GetPostsRequest {
  int32 user_id = 1;
  string cursor = 2;
  int32 limit = 3;
}

message GetHashtagPostsRequest {
  string tag = 1;
  string cursor = 2;
  int32 limit = 3;
}

message GetRepliesRequest {
  int32 post_id = 1;
  string cursor = 2;
  int32 limit = 3;
  string public_id = 4;
}

message GetPopularPostsRequest {
  string cursor = 1;
  int32 limit = 2;
}

message Hashtag {
  int32 id = 1;
  string name = 2;
  int32 post_count = 3;
}

message Hashtags {
  repeated Hashtag hashtags = 1;
  string next_cursor = 2;
}

service PostService {
  rpc CreatePost(CreatePostRequest) returns (PostIdentifier);
  rpc GetFeed(GetFeedRequest) returns (Posts);
  rpc GetPosts(GetPostsRequest) returns (Posts);
  rpc GetUserReplies(GetPostsRequest) returns (Posts);
  rpc GetLikedPosts(GetPostsRequest) returns (Posts);
  rpc GetHashtagPosts(GetHashtagPostsRequest) returns (Posts);
  rpc GetPost(PostRequest) returns (Post);
  rpc GetPostsByIds(Ids) returns (Posts);
  rpc DeletePost(PostRequest) returns (Empty);
  rpc LikePost(PostRequest) returns (Empty);
  rpc UnlikePost(PostRequest) returns (Empty);
  rpc RepostPost(PostRequest) returns (Empty);
  rpc RemoveRepost(PostRequest) returns (Empty);
  rpc GetReplies(GetRepliesRequest) returns (Posts);
  rpc GetPopularPosts(GetPopularPostsRequest) returns (Posts);
}

// Images

message VerifyUploadRequest {
  string filename = 1;
  int32 user_id = 2;
}

message ConsumeUploadRequest {
  string filename = 1;
  int32 user_id = 2;
}

message DeleteImageRequest {
  string filename = 1;
}

service ImageService {
  rpc VerifyUpload(VerifyUploadRequest) returns (Empty);
  rpc ConsumeUpload(ConsumeUploadRequest) returns (Empty);
  rpc DeleteImage(DeleteImageRequest) returns (Empty);
}

// Search

message SearchRequest {
  string query = 1;
  string cursor = 2;
  int32 limit = 3;
}

message RecentSearch {
  string id = 1;
  string type = 2;
  string reference = 3;
  User user = 4;
  Hashtag hashtag = 5;
}

message RecentSearches {
  repeated RecentSearch items = 1;
}

message RecordRecentSearchRequest {
  string type = 1;
  string reference = 2;
}

message DeleteRecentSearchRequest {
  string id = 1;
}

service SearchService {
  rpc SearchUsers(SearchRequest) returns (Users);
  rpc SearchPosts(SearchRequest) returns (Posts);
  rpc SearchHashtags(SearchRequest) returns (Hashtags);
  rpc ListRecentSearches(Empty) returns (RecentSearches);
  rpc RecordRecentSearch(RecordRecentSearchRequest) returns (Empty);
  rpc DeleteRecentSearch(DeleteRecentSearchRequest) returns (Empty);
  rpc ClearRecentSearches(Empty) returns (Empty);
}

message GetNotificationsRequest {
  int32 user_id = 1;
  string cursor = 2;
  int32 limit = 3;
}

message Notification {
  int64 id = 1;
  int64 external_id = 2;
  int32 user_id = 3;
  int32 actor_id = 4;
  string type = 5;
  string entity_id = 6;
  bool read = 7;
  string created = 8;
}

message Notifications {
  repeated Notification notifications = 1;
  string next_cursor = 2;
}

message NotificationRequest {
  int64 notification_id = 1;
  int32 user_id = 2;
}

message UnreadCountResponse {
  int32 count = 1;
}

service NotificationService {
  rpc GetNotifications(GetNotificationsRequest) returns (Notifications);
  rpc MarkNotificationRead(NotificationRequest) returns (Empty);
  rpc GetUnreadCount(UserRequest) returns (UnreadCountResponse);
}
