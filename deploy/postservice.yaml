apiVersion: v1
kind: Service
metadata:
  name: postservice
  labels:
    app: cogito
    tier: backend
    component: postservice
spec:
  selector:
    app: cogito
    tier: backend
    component: postservice
  ports:
  - port: 5050
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postservice
  labels:
    app: cogito
    tier: backend
    component: postservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cogito
      tier: backend
      component: postservice
  template:
    metadata:
      labels:
        app: cogito
        tier: backend
        component: postservice
    spec:
      containers:
      - name: postservice
        image: localhost:5000/cogito/postservice
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5050
        resources:
          limits:
            memory: 128Mi
          requests:
            memory: 64Mi
            cpu: 100m
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: database-url
        - name: INTERNAL_GRPC_TOKEN
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: internal-grpc-token
        livenessProbe:
          tcpSocket:
            port: 5050
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 5050
          initialDelaySeconds: 5
          periodSeconds: 10
