apiVersion: v1
kind: ConfigMap
metadata:
  name: broker-pipelines
  labels:
    app: cogito
    tier: broker
data:
  relay.yaml: |
    input:
      generate:
        interval: 2s
        count: 0
        mapping: root = {}
    pipeline:
      processors:
      - sql_raw:
          driver: postgres
          dsn: "${DATABASE_DSN}"
          # Recycle pooled connections so post-restart stale TCP sessions
          # self-heal instead of polling empty indefinitely.
          conn_max_life_time: 2m
          query: |
            DELETE FROM outbox
            WHERE id IN (
              SELECT id FROM outbox ORDER BY id
              FOR UPDATE SKIP LOCKED
              LIMIT 100
            )
            RETURNING id, topic, payload::text AS payload
      - mapping: root = if this.length() == 0 { deleted() }
      - unarchive:
          format: json_array
      - mapping: |
          root = this.payload.parse_json()
          root._outbox_id = this.id
          meta topic = this.topic
    output:
      kafka_franz:
        seed_brokers: ["${REDPANDA_BROKERS}"]
        topic: ${! meta("topic") }
        key: ${! json("_outbox_id") }
        idempotent_write: true
        max_in_flight: 1
  sync-search.yaml: |
    input:
      kafka_franz:
        seed_brokers: ["${REDPANDA_BROKERS}"]
        topics: [entity-changes]
        consumer_group: sync-search
    output:
      switch:
        cases:
        - check: this.table == "users" && this.op == "upsert"
          output:
            http_client:
              url: ${MEILI_HOST}/indexes/users/documents?primaryKey=id
              verb: POST
              headers:
                Authorization: Bearer ${MEILI_MASTER_KEY}
                Content-Type: application/json
        - check: this.table == "posts" && this.op == "upsert" && !this.exists("in_reply_to_id") && !this.exists("repost_of_id")
          output:
            http_client:
              url: ${MEILI_HOST}/indexes/posts/documents?primaryKey=id
              verb: POST
              headers:
                Authorization: Bearer ${MEILI_MASTER_KEY}
                Content-Type: application/json
        - check: this.table == "posts" && this.op == "delete" && !this.exists("in_reply_to_id") && !this.exists("repost_of_id")
          output:
            http_client:
              url: ${MEILI_HOST}/indexes/posts/documents/${! json("id") }
              verb: DELETE
              headers:
                Authorization: Bearer ${MEILI_MASTER_KEY}
        - check: this.table == "hashtags" && this.op == "upsert" && this.post_count > 0
          output:
            http_client:
              url: ${MEILI_HOST}/indexes/hashtags/documents?primaryKey=id
              verb: POST
              headers:
                Authorization: Bearer ${MEILI_MASTER_KEY}
                Content-Type: application/json
        - check: this.table == "hashtags" && this.op == "upsert" && this.post_count == 0
          output:
            http_client:
              url: ${MEILI_HOST}/indexes/hashtags/documents/${! json("name") }
              verb: DELETE
              headers:
                Authorization: Bearer ${MEILI_MASTER_KEY}
  cleanup-s3.yaml: |
    input:
      kafka_franz:
        seed_brokers: ["${REDPANDA_BROKERS}"]
        topics: [entity-changes]
        consumer_group: cleanup-s3
    pipeline:
      processors:
      - mapping: root = if this.table != "posts" || this.op != "delete" || this.media_key.or("") == "" { deleted() }
    output:
      http_client:
        url: ${S3_ENDPOINT}/${S3_BUCKET}/${! json("media_key") }
        verb: DELETE
  backfill.yaml: |
    input:
      sql_raw:
        driver: postgres
        dsn: "${DATABASE_DSN}"
        query: |
          SELECT 'entity-changes' AS topic,
                 jsonb_build_object('table','users','op','upsert','id',u.id,'username',u.username,'name',u.name,'bio',u.bio,'created',u.created,'follower_count',(SELECT COUNT(*)::int FROM followers WHERE user_id = u.id),'fan_out_disabled',u.fan_out_disabled) AS payload
          FROM users u
          UNION ALL
          SELECT 'entity-changes' AS topic,
                 jsonb_build_object('table','posts','op','upsert','id',p.id,'public_id',p.public_id,'author_id',p.user_id,'follower_count',(SELECT COUNT(*)::int FROM followers WHERE user_id = p.user_id),'fan_out_disabled',u.fan_out_disabled,'content',p.content,'hashtags',COALESCE(jsonb_agg(h.name) FILTER (WHERE h.name IS NOT NULL), '[]'::jsonb),'created',p.created) AS payload
          FROM posts p
          JOIN users u ON u.id = p.user_id
          LEFT JOIN post_hashtags ph ON ph.post_id = p.id
          LEFT JOIN hashtags h ON h.id = ph.hashtag_id
          WHERE p.in_reply_to_id IS NULL AND p.repost_of_id IS NULL
          GROUP BY p.id, u.fan_out_disabled
          UNION ALL
          SELECT 'entity-changes' AS topic,
                 jsonb_build_object('table','hashtags','op','upsert','id',h.id,'name',h.name,'post_count',COUNT(ph.post_id)) AS payload
          FROM hashtags h
          LEFT JOIN post_hashtags ph ON ph.hashtag_id = h.id
          GROUP BY h.id, h.name
    pipeline:
      processors:
      - mapping: |
          root = this.payload.parse_json()
          meta topic = this.topic
    output:
      kafka_franz:
        seed_brokers: ["${REDPANDA_BROKERS}"]
        topic: ${! meta("topic") }
        key: ${! json("table") + ":" + json("id").or(json("name")) }
---
apiVersion: v1
kind: Service
metadata:
  name: broker
  labels:
    app: cogito
    tier: broker
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: cogito
    tier: broker
  ports:
  - name: broker
    port: 9092
    targetPort: broker
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: broker
  labels:
    app: cogito
    tier: broker
spec:
  serviceName: broker
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: cogito
      tier: broker
  template:
    metadata:
      labels:
        app: cogito
        tier: broker
    spec:
      serviceAccountName: broker
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: broker
        image: redpandadata/redpanda:v26.1.10
        imagePullPolicy: IfNotPresent
        args:
        - redpanda
        - start
        - --mode=dev-container
        - --kafka-addr=PLAINTEXT://0.0.0.0:9092
        - --advertise-kafka-addr=PLAINTEXT://$(POD_NAME).broker:9092
        - --advertise-rpc-addr=$(POD_NAME).broker:33145
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        ports:
        - name: broker
          containerPort: 9092
        - name: admin
          containerPort: 9644
        resources:
          limits:
            memory: 2Gi
          requests:
            memory: 512Mi
            cpu: 50m
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: broker-data
          mountPath: /var/lib/redpanda/data
        - name: tmp
          mountPath: /tmp
        - name: broker-config
          mountPath: /etc/redpanda
        startupProbe:
          httpGet:
            path: /v1/status/ready
            port: 9644
          failureThreshold: 30
          periodSeconds: 2
        readinessProbe:
          httpGet:
            path: /v1/status/ready
            port: 9644
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /v1/status/ready
            port: 9644
          initialDelaySeconds: 10
          periodSeconds: 15
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 256Mi
      - name: broker-config
        emptyDir:
          sizeLimit: 16Mi
  volumeClaimTemplates:
  - metadata:
      name: broker-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: broker-backfill
  labels:
    app: cogito
    tier: broker
    component: broker-backfill
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: cogito
        tier: broker
        component: broker-backfill
    spec:
      serviceAccountName: connect
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: backfill
        image: redpandadata/connect:4.97.0
        imagePullPolicy: IfNotPresent
        args: ["-c", "/pipelines/backfill.yaml"]
        resources:
          limits:
            memory: 256Mi
          requests:
            memory: 64Mi
            cpu: 50m
        env:
        - name: REDPANDA_BROKERS
          value: broker:9092
        - name: DATABASE_DSN
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: database-url
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: broker-pipelines
          mountPath: /pipelines
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: broker-pipelines
        configMap:
          name: broker-pipelines
          items:
          - key: backfill.yaml
            path: backfill.yaml
      - name: tmp
        emptyDir:
          sizeLimit: 64Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connect
  labels:
    app: cogito
    tier: broker
    component: connect
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: cogito
      tier: broker
      component: connect
  template:
    metadata:
      labels:
        app: cogito
        tier: broker
        component: connect
    spec:
      serviceAccountName: connect
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: relay
        image: redpandadata/connect:4.97.0
        imagePullPolicy: IfNotPresent
        args: ["-c", "/pipelines/relay.yaml"]
        resources:
          limits:
            memory: 128Mi
          requests:
            memory: 32Mi
            cpu: 25m
        env: &connect-env
        - name: REDPANDA_BROKERS
          value: broker:9092
        - name: DATABASE_DSN
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: database-url
        - name: MEILI_HOST
          value: http://search:7700
        - name: MEILI_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: search-master-key
        - name: S3_ENDPOINT
          value: http://storage:8333
        - name: S3_BUCKET
          value: cogito-images
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: s3-access-key
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: s3-secret-key
        securityContext: &connect-container-security
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts: &connect-volume-mounts
        - name: broker-pipelines
          mountPath: /pipelines
          readOnly: true
        - name: tmp
          mountPath: /tmp
      - name: sync-search
        image: redpandadata/connect:4.97.0
        imagePullPolicy: IfNotPresent
        args: ["-c", "/pipelines/sync-search.yaml"]
        resources:
          limits:
            memory: 128Mi
          requests:
            memory: 32Mi
            cpu: 25m
        env: *connect-env
        securityContext: *connect-container-security
        volumeMounts: *connect-volume-mounts
      - name: cleanup-s3
        image: redpandadata/connect:4.97.0
        imagePullPolicy: IfNotPresent
        args: ["-c", "/pipelines/cleanup-s3.yaml"]
        resources:
          limits:
            memory: 128Mi
          requests:
            memory: 32Mi
            cpu: 25m
        env: *connect-env
        securityContext: *connect-container-security
        volumeMounts: *connect-volume-mounts
      volumes:
      - name: broker-pipelines
        configMap:
          name: broker-pipelines
      - name: tmp
        emptyDir:
          sizeLimit: 64Mi
