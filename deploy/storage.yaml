apiVersion: v1
kind: Secret
metadata:
  name: seaweedfs-credentials
  namespace: cogito
type: Opaque
stringData:
  accessKey: cogito-access-key
  secretKey: cogito-secret-key
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: seaweedfs-config
data:
  s3.json: |
    {
      "identities": [
        {
          "name": "cogito",
          "credentials": [
            {
              "accessKey": "{{ .Env.S3_ACCESS_KEY }}",
              "secretKey": "{{ .Env.S3_SECRET_KEY }}"
            }
          ],
          "actions": ["Read", "Write", "List", "Tagging", "Admin"]
        }
      ]
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seaweedfs
  labels:
    app: cogito
    component: seaweedfs
spec:
  serviceName: seaweedfs
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: cogito
      component: seaweedfs
  template:
    metadata:
      labels:
        app: cogito
        component: seaweedfs
    spec:
      containers:
      - name: seaweedfs
        # Pin to a specific version; verify against running cluster before upgrading.
        image: chrislusf/seaweedfs:3.68
        args: ["server", "-s3", "-s3.config=/etc/seaweed/s3.json"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8333
          name: s3
        resources:
          limits:
            memory: 256Mi
          requests:
            memory: 64Mi
            cpu: 50m
        volumeMounts:
        - name: seaweedfs-data
          mountPath: /data
        - name: seaweedfs-config
          mountPath: /etc/seaweed
      volumes:
      - name: seaweedfs-config
        configMap:
          name: seaweedfs-config
  volumeClaimTemplates:
  - metadata:
      name: seaweedfs-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
  labels:
    app: cogito
    component: seaweedfs
spec:
  clusterIP: None
  selector:
    app: cogito
    component: seaweedfs
  ports:
  - name: s3
    port: 8333
    targetPort: 8333
