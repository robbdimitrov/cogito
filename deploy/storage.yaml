apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: storage
  labels:
    app: cogito
    component: storage
spec:
  serviceName: storage
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: cogito
      component: storage
  template:
    metadata:
      labels:
        app: cogito
        component: storage
    spec:
      automountServiceAccountToken: false
      containers:
      - name: storage
        # Pin to a specific version; verify against running cluster before upgrading.
        image: chrislusf/seaweedfs:3.68
        command: ["/bin/sh", "-ec"]
        args:
        - |
          cat > /etc/seaweed/s3.json <<EOF
          {
            "identities": [
              {
                "name": "cogito",
                "credentials": [
                  {
                    "accessKey": "$(cat /etc/seaweed-secrets/s3-access-key)",
                    "secretKey": "$(cat /etc/seaweed-secrets/s3-secret-key)"
                  }
                ],
                "actions": ["Read", "Write", "List", "Tagging"]
              },
              {
                "name": "cogito-provisioning",
                "credentials": [
                  {
                    "accessKey": "$(cat /etc/seaweed-secrets/s3-provisioning-access-key)",
                    "secretKey": "$(cat /etc/seaweed-secrets/s3-provisioning-secret-key)"
                  }
                ],
                "actions": ["Admin"]
              }
            ]
          }
          EOF
          exec weed server -s3 -s3.config=/etc/seaweed/s3.json
        securityContext:
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8333
          name: s3
        resources:
          limits:
            memory: 256Mi
          requests:
            memory: 64Mi
            cpu: 50m
        volumeMounts:
        - name: storage-data
          mountPath: /data
        - name: storage-config
          mountPath: /etc/seaweed
        - name: storage-credentials
          mountPath: /etc/seaweed-secrets
          readOnly: true
      volumes:
      - name: storage-config
        emptyDir:
          medium: Memory
      - name: storage-credentials
        secret:
          secretName: cogito-db-secret
          items:
          - key: s3-access-key
            path: s3-access-key
          - key: s3-secret-key
            path: s3-secret-key
          - key: s3-provisioning-access-key
            path: s3-provisioning-access-key
          - key: s3-provisioning-secret-key
            path: s3-provisioning-secret-key
  volumeClaimTemplates:
  - metadata:
      name: storage-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: storage
  labels:
    app: cogito
    component: storage
spec:
  clusterIP: None
  selector:
    app: cogito
    component: storage
  ports:
  - name: s3
    port: 8333
    targetPort: s3
