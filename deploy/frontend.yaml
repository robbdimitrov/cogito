apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: cogito
    tier: frontend
  ports:
  - port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: cogito
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cogito
      tier: frontend
  template:
    metadata:
      labels:
        app: cogito
        tier: frontend
    spec:
      serviceAccountName: frontend
      automountServiceAccountToken: false
      containers:
      - name: frontend
        image: localhost:5000/cogito/frontend
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
          runAsGroup: 65534
          capabilities:
            drop:
            - ALL
        env:
        - name: BACKEND_URL
          value: http://apigateway:8080
        - name: BODY_SIZE_LIMIT
          value: "2097152"
        - name: ADDRESS_HEADER
          value: x-forwarded-for
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 512Mi
          requests:
            memory: 128Mi
            cpu: 50m
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
      volumes:
      - name: tmp
        emptyDir: {}
