apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: thoughts
    tier: frontend
  ports:
  - port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: thoughts
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thoughts
      tier: frontend
  template:
    metadata:
      labels:
        app: thoughts
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: localhost:5000/thoughts/frontend
        imagePullPolicy: IfNotPresent
        env:
        - name: API_URL
          value: http://apigateway:8080
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 512Mi
          requests:
            memory: 256Mi
            cpu: 250m
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
spec:
  rules:
  - host: thoughts.localhost
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 8080
