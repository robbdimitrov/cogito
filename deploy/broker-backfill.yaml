apiVersion: batch/v1
kind: Job
metadata:
  name: broker-backfill
  labels:
    app: thoughts
    tier: broker
    component: broker-backfill
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: thoughts
        tier: broker
        component: broker-backfill
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: backfill
        image: redpandadata/connect:latest
        imagePullPolicy: IfNotPresent
        args: ["-c", "/pipelines/backfill.yaml"]
        env:
        - name: REDPANDA_BROKERS
          value: broker:9092
        - name: POSTGRES_DSN
          valueFrom:
            secretKeyRef:
              name: thoughts-db-secret
              key: database-url
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: broker-pipelines
          mountPath: /pipelines
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: broker-pipelines
        configMap:
          name: broker-pipelines
          items:
          - key: backfill.yaml
            path: backfill.yaml
      - name: tmp
        emptyDir: {}
