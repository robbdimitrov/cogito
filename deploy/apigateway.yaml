apiVersion: v1
kind: Service
metadata:
  name: apigateway
  labels:
    app: thoughts
    tier: backend
    component: apigateway
spec:
  selector:
    app: thoughts
    tier: backend
    component: apigateway
  ports:
  - port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apigateway
  labels:
    app: thoughts
    tier: backend
    component: apigateway
spec:
  selector:
    matchLabels:
      app: thoughts
      tier: backend
      component: apigateway
  template:
    metadata:
      labels:
        app: thoughts
        tier: backend
        component: apigateway
    spec:
      initContainers:
      - name: migration
        image: localhost:5000/thoughts/database
        imagePullPolicy: IfNotPresent
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: thoughts-db-secret
              key: postgres-password
      containers:
      - name: apigateway
        image: localhost:5000/thoughts/apigateway
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 100Mi
            cpu: 500m
          requests:
            memory: 50Mi
            cpu: 100m
        env:
        - name: AUTH_SERVICE_ADDR
          value: authservice:5050
        - name: POST_SERVICE_ADDR
          value: postservice:5050
        - name: USER_SERVICE_ADDR
          value: userservice:5050
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: thoughts-db-secret
              key: database-url
        - name: INTERNAL_GRPC_TOKEN
          valueFrom:
            secretKeyRef:
              name: thoughts-db-secret
              key: internal-grpc-token
        - name: SESSION_HMAC_SECRET
          valueFrom:
            secretKeyRef:
              name: thoughts-db-secret
              key: session-hmac-secret
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
