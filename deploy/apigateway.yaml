apiVersion: v1
kind: Service
metadata:
  name: apigateway
  labels:
    app: cogito
    tier: backend
    component: apigateway
spec:
  selector:
    app: cogito
    tier: backend
    component: apigateway
  ports:
  - port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apigateway
  labels:
    app: cogito
    tier: backend
    component: apigateway
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: cogito
      tier: backend
      component: apigateway
  template:
    metadata:
      labels:
        app: cogito
        tier: backend
        component: apigateway
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      initContainers:
      - name: migration
        image: localhost:5000/cogito/database
        imagePullPolicy: IfNotPresent
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: database-url
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: postgres-password
      containers:
      - name: apigateway
        image: localhost:5000/cogito/apigateway
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 128Mi
          requests:
            memory: 64Mi
            cpu: 50m
        env:
        - name: AUTH_SERVICE_ADDR
          value: authservice:5050
        - name: POST_SERVICE_ADDR
          value: postservice:5050
        - name: USER_SERVICE_ADDR
          value: userservice:5050
        - name: FLOW_SERVICE_ADDR
          value: flowservice:5050
        - name: INTERNAL_GRPC_TOKEN
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: internal-grpc-token
        - name: DRAGONFLY_URL
          value: "redis://dragonfly:6379"
        - name: RATE_LIMIT_FAIL_OPEN
          value: "true"
        - name: SESSION_HMAC_SECRET
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: session-hmac-secret
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
