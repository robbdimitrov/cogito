apiVersion: v1
kind: Service
metadata:
  name: authservice
  labels:
    app: cogito
    tier: backend
    component: authservice
spec:
  selector:
    app: cogito
    tier: backend
    component: authservice
  ports:
  - port: 5050
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authservice
  labels:
    app: cogito
    tier: backend
    component: authservice
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: cogito
      tier: backend
      component: authservice
  template:
    metadata:
      labels:
        app: cogito
        tier: backend
        component: authservice
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      containers:
      - name: authservice
        image: localhost:5000/cogito/authservice
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
          runAsGroup: 65534
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 5050
        resources:
          limits:
            memory: 128Mi
          requests:
            memory: 32Mi
            cpu: 25m
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: database-url
        - name: INTERNAL_GRPC_TOKEN
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: internal-grpc-token
        - name: SESSION_HMAC_SECRET
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: session-hmac-secret
        livenessProbe:
          tcpSocket:
            port: 5050
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 5050
          initialDelaySeconds: 5
          periodSeconds: 10
