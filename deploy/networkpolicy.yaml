kind: NetworkPolicy
metadata:
  name: database
spec:
  podSelector:
    matchLabels:
      app: cogito
      tier: database
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: cogito
          tier: backend
          component: authservice
    - podSelector:
        matchLabels:
          app: cogito
          tier: backend
          component: userservice
    - podSelector:
        matchLabels:
          app: cogito
          tier: backend
          component: postservice
    - podSelector:
        matchLabels:
          app: cogito
          tier: backend
          component: imageservice
    - podSelector:
        matchLabels:
          app: cogito
          tier: backend
          component: flowservice
    - podSelector:
        matchLabels:
          app: cogito
          tier: broker
          component: connect
    - podSelector:
        matchLabels:
          app: cogito
          tier: broker
          component: broker-backfill
    - podSelector:
        matchLabels:
          app: cogito
          tier: backend
          component: apigateway
