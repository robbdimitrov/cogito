apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: broker
spec:
  podSelector:
    matchLabels:
      app: cogito
      tier: broker
    matchExpressions:
    - key: component
      operator: DoesNotExist
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: cogito
          tier: backend
          component: postservice
    - podSelector:
        matchLabels:
          app: cogito
          tier: backend
          component: userservice
    - podSelector:
        matchLabels:
          app: cogito
          tier: backend
          component: flowservice
    - podSelector:
        matchLabels:
          app: cogito
          tier: broker
          component: connect
    - podSelector:
        matchLabels:
          app: cogito
          tier: broker
          component: broker-backfill
    ports:
    - protocol: TCP
      port: 9092
