apiVersion: v1
kind: Service
metadata:
  name: database
  labels:
    app: thoughts
    tier: database
spec:
  selector:
    app: thoughts
    tier: database
  ports:
  - name: postgres
    port: 5432
    targetPort: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: database-headless
  labels:
    app: thoughts
    tier: database
spec:
  clusterIP: None
  selector:
    app: thoughts
    tier: database
  ports:
  - name: postgres
    port: 5432
    targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: database
  labels:
    app: thoughts
    tier: database
spec:
  serviceName: database-headless
  replicas: 1
  selector:
    matchLabels:
      app: thoughts
      tier: database
  template:
    metadata:
      labels:
        app: thoughts
        tier: database
    spec:
      terminationGracePeriodSeconds: 60
      containers:
      - name: database
        image: postgres:18.4-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - name: postgres
          containerPort: 5432
        resources:
          limits:
            memory: 512Mi
          requests:
            memory: 512Mi
            cpu: 500m
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: thoughts-db-secret
              key: postgres-password
        - name: POSTGRES_DB
          value: thoughts
        - name: PGDATA
          value: /var/lib/postgresql/18/docker
        volumeMounts:
        - mountPath: /var/lib/postgresql
          name: database-storage
        startupProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - thoughts
          failureThreshold: 30
          periodSeconds: 2
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - thoughts
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - thoughts
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
  volumeClaimTemplates:
  - metadata:
      name: database-storage
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
