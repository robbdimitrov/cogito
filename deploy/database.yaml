apiVersion: v1
kind: Service
metadata:
  name: database
spec:
  selector:
    app: thoughts
    tier: database
  ports:
  - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  labels:
    app: thoughts
    tier: database
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: thoughts
      tier: database
  template:
    metadata:
      labels:
        app: thoughts
        tier: database
    spec:
      containers:
      - name: database
        image: postgres:17-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
        resources:
          limits:
            memory: 512Mi
            cpu: 1000m
          requests:
            memory: 256Mi
            cpu: 500m
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: thoughts-db-secret
              key: postgres-password
        - name: POSTGRES_DB
          value: thoughts
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: database-storage
        startupProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - thoughts
          failureThreshold: 30
          periodSeconds: 2
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - thoughts
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
      volumes:
        - name: database-storage
          persistentVolumeClaim:
            claimName: database-pv-claim
