apiVersion: v1
kind: ConfigMap
metadata:
  name: database-init
data:
  init.sh: |
    psql --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" --set=app_password="$COGITO_APP_PASSWORD" <<'SQL'
    CREATE USER cogito_app WITH PASSWORD :'app_password';
    GRANT CONNECT ON DATABASE cogito TO cogito_app;
    GRANT USAGE ON SCHEMA public TO cogito_app;
    GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO cogito_app;
    GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO cogito_app;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO cogito_app;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO cogito_app;
    SQL
---
apiVersion: v1
kind: Service
metadata:
  name: database
  labels:
    app: cogito
    tier: database
spec:
  selector:
    app: cogito
    tier: database
  ports:
  - name: database
    port: 5432
    targetPort: database
---
apiVersion: v1
kind: Service
metadata:
  name: database-headless
  labels:
    app: cogito
    tier: database
spec:
  clusterIP: None
  selector:
    app: cogito
    tier: database
  ports:
  - name: database
    port: 5432
    targetPort: database
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: database
  labels:
    app: cogito
    tier: database
spec:
  serviceName: database-headless
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: cogito
      tier: database
  template:
    metadata:
      labels:
        app: cogito
        tier: database
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 70
      volumes:
      - name: database-init
        configMap:
          name: database-init
      - name: database-tls
        secret:
          secretName: database-tls
          defaultMode: 0640
      containers:
      - name: database
        image: postgres:18.4-alpine
        imagePullPolicy: IfNotPresent
        args:
        - -c
        - wal_level=logical
        - -c
        - ssl=on
        - -c
        - ssl_cert_file=/certs/tls.crt
        - -c
        - ssl_key_file=/certs/tls.key
        ports:
        - name: database
          containerPort: 5432
        resources:
          limits:
            memory: 512Mi
          requests:
            memory: 512Mi
            cpu: 50m
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: database-password
        - name: COGITO_APP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: cogito-app-password
        - name: POSTGRES_DB
          value: cogito
        - name: PGDATA
          value: /var/lib/postgresql/18/docker
        securityContext:
          allowPrivilegeEscalation: false
        volumeMounts:
        - mountPath: /var/lib/postgresql
          name: database-storage
        - mountPath: /docker-entrypoint-initdb.d
          name: database-init
          readOnly: true
        - mountPath: /certs
          name: database-tls
          readOnly: true
        startupProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - cogito
          failureThreshold: 30
          periodSeconds: 2
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - cogito
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - cogito
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
  volumeClaimTemplates:
  - metadata:
      name: database-storage
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
