apiVersion: v1
kind: Service
metadata:
  name: meilisearch
  labels:
    app: cogito
    tier: backend
    component: meilisearch
spec:
  selector:
    app: cogito
    tier: backend
    component: meilisearch
  ports:
  - port: 7700
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: meilisearch
  labels:
    app: cogito
    tier: backend
    component: meilisearch
spec:
  serviceName: meilisearch
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: cogito
      tier: backend
      component: meilisearch
  template:
    metadata:
      labels:
        app: cogito
        tier: backend
        component: meilisearch
    spec:
      containers:
      - name: meilisearch
        image: getmeili/meilisearch:v1.15.0
        ports:
        - containerPort: 7700
        resources:
          limits:
            memory: 512Mi
          requests:
            memory: 256Mi
            cpu: 50m
        env:
        - name: MEILI_ENV
          value: production
        - name: MEILI_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: meili-master-key
        - name: MEILI_DB_PATH
          value: /data/meilisearch
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: data
          mountPath: /data
        startupProbe:
          httpGet:
            path: /health
            port: 7700
          failureThreshold: 30
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 7700
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 7700
          initialDelaySeconds: 10
          periodSeconds: 15
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
