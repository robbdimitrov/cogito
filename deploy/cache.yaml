apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dragonfly
  labels:
    app: cogito
    component: dragonfly
spec:
  serviceName: dragonfly
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: cogito
      component: dragonfly
  template:
    metadata:
      labels:
        app: cogito
        component: dragonfly
    spec:
      automountServiceAccountToken: false
      containers:
      - name: dragonfly
        image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.25.0
        args: ["--proactor_threads=1", "--maxmemory=300mb"]
        ports:
        - containerPort: 6379
          name: redis
        resources:
          limits:
            memory: 400Mi
          requests:
            memory: 300Mi
            cpu: 50m
        securityContext:
          allowPrivilegeEscalation: false
        volumeMounts:
        - name: dragonfly-data
          mountPath: /data
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 3
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: dragonfly-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: dragonfly
  labels:
    app: cogito
    component: dragonfly
spec:
  selector:
    app: cogito
    component: dragonfly
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
