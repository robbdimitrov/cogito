apiVersion: v1
kind: Service
metadata:
  name: userservice
  labels:
    app: thoughts
    tier: backend
    component: userservice
spec:
  selector:
    app: thoughts
    tier: backend
    component: userservice
  ports:
  - port: 5050
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: userservice
  labels:
    app: thoughts
    tier: backend
    component: userservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thoughts
      tier: backend
      component: userservice
  template:
    metadata:
      labels:
        app: thoughts
        tier: backend
        component: userservice
    spec:
      containers:
      - name: userservice
        image: localhost:5000/thoughts/userservice
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5050
        resources:
          limits:
            memory: 128Mi
          requests:
            memory: 32Mi
            cpu: 50m
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: thoughts-db-secret
              key: database-url
        - name: INTERNAL_GRPC_TOKEN
          valueFrom:
            secretKeyRef:
              name: thoughts-db-secret
              key: internal-grpc-token
        livenessProbe:
          tcpSocket:
            port: 5050
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 5050
          initialDelaySeconds: 5
          periodSeconds: 10
