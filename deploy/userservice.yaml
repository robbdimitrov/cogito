apiVersion: v1
kind: Service
metadata:
  name: userservice
  labels:
    app: cogito
    tier: backend
    component: userservice
spec:
  selector:
    app: cogito
    tier: backend
    component: userservice
  ports:
  - port: 5050
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: userservice
  labels:
    app: cogito
    tier: backend
    component: userservice
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: cogito
      tier: backend
      component: userservice
  template:
    metadata:
      labels:
        app: cogito
        tier: backend
        component: userservice
    spec:
      serviceAccountName: userservice
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      containers:
      - name: userservice
        image: cogito/userservice
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
          runAsGroup: 65534
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 5050
        resources:
          limits:
            memory: 128Mi
          requests:
            memory: 32Mi
            cpu: 25m
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: database-url
        - name: INTERNAL_GRPC_TOKEN
          valueFrom:
            secretKeyRef:
              name: cogito-db-secret
              key: internal-grpc-token
        livenessProbe:
          tcpSocket:
            port: 5050
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 5050
          initialDelaySeconds: 5
          periodSeconds: 10
