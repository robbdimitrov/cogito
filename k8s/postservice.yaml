apiVersion: v1
kind: Service
metadata:
  name: postservice
  labels:
    app: thoughts
    tier: backend
    component: postservice
spec:
  selector:
    app: thoughts
    tier: backend
    component: postservice
  ports:
  - port: 5050
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postservice
  labels:
    app: thoughts
    tier: backend
    component: postservice
spec:
  selector:
    matchLabels:
      app: thoughts
      tier: backend
      component: postservice
  template:
    metadata:
      labels:
        app: thoughts
        tier: backend
        component: postservice
    spec:
      containers:
      - name: postservice
        image: localhost:5000/thoughts/postservice
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5050
        resources:
          limits:
            memory: 200Mi
            cpu: 500m
          requests:
            memory: 100Mi
            cpu: 200m
        env:
        - name: DATABASE_URL
          value: postgresql://postgres:kubernetes@database:5432/thoughts
