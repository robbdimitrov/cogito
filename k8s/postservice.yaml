apiVersion: v1
kind: Service
metadata:
  name: postservice
  labels:
    app: thoughts
    tier: backend
    component: postservice
spec:
  selector:
    app: thoughts
    tier: backend
    component: postservice
  ports:
  - port: 5050
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postservice
  labels:
    app: thoughts
    tier: backend
    component: postservice
spec:
  selector:
    matchLabels:
      app: thoughts
      tier: backend
      component: postservice
  template:
    metadata:
      labels:
        app: thoughts
        tier: backend
        component: postservice
    spec:
      containers:
      - name: postservice
        image: localhost:5000/thoughts/postservice
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5050
        resources:
          limits:
            memory: 100Mi
            cpu: 500m
          requests:
            memory: 50Mi
            cpu: 100m
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: thoughts-db-secret
              key: database-url
        - name: INTERNAL_GRPC_TOKEN
          valueFrom:
            secretKeyRef:
              name: thoughts-db-secret
              key: internal-grpc-token
        livenessProbe:
          tcpSocket:
            port: 5050
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 5050
          initialDelaySeconds: 5
          periodSeconds: 10
