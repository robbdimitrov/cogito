apiVersion: v1
kind: Service
metadata:
  name: authservice
  labels:
    app: thoughts
    tier: backend
    component: authservice
spec:
  selector:
    app: thoughts
    tier: backend
    component: authservice
  ports:
  - port: 5050
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authservice
  labels:
    app: thoughts
    tier: backend
    component: authservice
spec:
  selector:
    matchLabels:
      app: thoughts
      tier: backend
      component: authservice
  template:
    metadata:
      labels:
        app: thoughts
        tier: backend
        component: authservice
    spec:
      containers:
      - name: authservice
        image: localhost:5000/thoughts/authservice
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5050
        resources:
          limits:
            memory: 200Mi
            cpu: 500m
          requests:
            memory: 100Mi
            cpu: 200m
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: thoughts-db-secret
              key: database-url
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - import grpc; from genproto import thoughts_pb2_grpc; c=grpc.insecure_channel('localhost:5050'); thoughts_pb2_grpc.AuthServiceStub(c).GetSession(thoughts_pb2_grpc.thoughts_pb2.SessionRequest(session_id='health')); c.close()
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 5050
          initialDelaySeconds: 5
          periodSeconds: 10
