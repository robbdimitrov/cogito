apiVersion: v1
kind: Service
metadata:
  name: authservice
  labels:
    app: thoughts
    tier: backend
    component: authservice
spec:
  selector:
    app: thoughts
    tier: backend
    component: authservice
  ports:
  - port: 5050
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authservice
  labels:
    app: thoughts
    tier: backend
    component: authservice
spec:
  selector:
    matchLabels:
      app: thoughts
      tier: backend
      component: authservice
  template:
    metadata:
      labels:
        app: thoughts
        tier: backend
        component: authservice
    spec:
      containers:
      - name: authservice
        image: localhost:5000/thoughts/authservice
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5050
        resources:
          limits:
            memory: 256Mi
            cpu: 500m
          requests:
            memory: 128Mi
            cpu: 200m
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: thoughts-db-secret
              key: database-url
        - name: INTERNAL_GRPC_TOKEN
          valueFrom:
            secretKeyRef:
              name: thoughts-db-secret
              key: internal-grpc-token
        livenessProbe:
          tcpSocket:
            port: 5050
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 5050
          initialDelaySeconds: 5
          periodSeconds: 10
