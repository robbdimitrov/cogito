apiVersion: v1
kind: Service
metadata:
  name: database
spec:
  selector:
    app: thoughts
    tier: database
  ports:
  - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  labels:
    app: thoughts
    tier: database
spec:
  selector:
    matchLabels:
      app: thoughts
      tier: database
  template:
    metadata:
      labels:
        app: thoughts
        tier: database
    spec:
      containers:
      - name: database
        image: localhost:5000/thoughts/database
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
        resources:
          limits:
            memory: 200Mi
            cpu: 500m
          requests:
            memory: 100Mi
            cpu: 200m
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: thoughts-db-secret
              key: postgres-password
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: database-storage
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
        - name: database-storage
          persistentVolumeClaim:
            claimName: database-pv-claim
