apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: thoughts
    tier: frontend
  ports:
  - port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: thoughts
    tier: frontend
spec:
  selector:
    matchLabels:
      app: thoughts
      tier: frontend
  template:
    metadata:
      labels:
        app: thoughts
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: localhost:5000/thoughts/frontend
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 200Mi
            cpu: 500m
          requests:
            memory: 100Mi
            cpu: 200m
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
