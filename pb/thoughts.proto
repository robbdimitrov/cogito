syntax = "proto3";

package thoughts;
option go_package = "./genproto";

// Users

message CreateUserRequest {
  string name = 1;
  string username = 2;
  string email = 3;
  string password = 4;
}

message Identifier {
  int32 id = 1;
}

message UserRequest {
  int32 user_id = 1;
}

message User {
  int32 id = 1;
  string name = 2;
  string username = 3;
  string email = 4;
  string bio = 5;
  int32 posts = 6;
  int32 likes = 7;
  int32 following = 8;
  int32 followers = 9;
  bool followed = 10;
  string created = 11;
  string profile_photo_key = 12;
  string cover_photo_key = 13;
}

message UpdateUserRequest {
  string name = 1;
  string username = 2;
  string email = 3;
  string password = 4;
  string old_password = 5;
  string bio = 6;
  optional string profile_photo_key = 7;
  optional string cover_photo_key = 8;
}

message GetUsersRequest {
  int32 user_id = 1;
  int32 page = 2;
  int32 limit = 3;
}

message Users {
  repeated User users = 1;
}

message GetUserByUsernameRequest {
  string username = 1;
}

message SearchUsersRequest {
  string query = 1;
  int32 limit = 2;
}

service UserService {
  rpc CreateUser(CreateUserRequest) returns (Identifier);
  rpc GetUser(UserRequest) returns (User);
  rpc GetUserByUsername(GetUserByUsernameRequest) returns (User);
  rpc UpdateUser(UpdateUserRequest) returns (Empty);
  rpc GetFollowing(GetUsersRequest) returns (Users);
  rpc GetFollowers(GetUsersRequest) returns (Users);
  rpc FollowUser(UserRequest) returns (Empty);
  rpc UnfollowUser(UserRequest) returns (Empty);
  rpc SearchUsers(SearchUsersRequest) returns (Users);
}

// Sessions

message Empty {}

message Credentials {
  string email = 1;
  string password = 2;
}

message SessionRequest {
  string session_id = 1;
}

message Session {
  string id = 1;
  int32 user_id = 2;
  string created = 3;
}

message Sessions {
  repeated Session sessions = 1;
}

service AuthService {
  rpc CreateSession(Credentials) returns (Session);
  rpc GetSession(SessionRequest) returns (Session);
  rpc DeleteSession(SessionRequest) returns (Empty);
  rpc GetSessions(UserRequest) returns (Sessions);
}

// Posts

message CreatePostRequest {
  string content = 1;
  optional string media_key = 2;
  optional int32 in_reply_to_id = 3;
  optional int32 quote_of_id = 4;
}

message PostRequest {
  int32 post_id = 1;
}

message Post {
  int32 id = 1;
  int32 user_id = 2;
  string content = 3;
  int32 likes = 4;
  bool liked = 5;
  int32 reposts = 6;
  bool reposted = 7;
  string created = 8;
  int32 repost_by_user_id = 9;
  string repost_created = 10;
  string media_key = 11;
  int32 replies = 12;
  int32 in_reply_to_id = 13;
  int32 quote_of_id = 14;
  Post quote_post = 15;
}

message GetFeedRequest {
  int32 page = 1;
  int32 limit = 2;
}

message Posts {
  repeated Post posts = 1;
}

message GetPostsRequest {
  int32 user_id = 1;
  int32 page = 2;
  int32 limit = 3;
}

message GetHashtagPostsRequest {
  string tag = 1;
  int32 page = 2;
  int32 limit = 3;
}

message GetRepliesRequest {
  int32 post_id = 1;
  int32 page = 2;
  int32 limit = 3;
}

service PostService {
  rpc CreatePost(CreatePostRequest) returns (Identifier);
  rpc GetFeed(GetFeedRequest) returns (Posts);
  rpc GetPosts(GetPostsRequest) returns (Posts);
  rpc GetLikedPosts(GetPostsRequest) returns (Posts);
  rpc GetHashtagPosts(GetHashtagPostsRequest) returns (Posts);
  rpc GetPost(PostRequest) returns (Post);
  rpc DeletePost(PostRequest) returns (Empty);
  rpc LikePost(PostRequest) returns (Empty);
  rpc UnlikePost(PostRequest) returns (Empty);
  rpc RepostPost(PostRequest) returns (Empty);
  rpc RemoveRepost(PostRequest) returns (Empty);
  rpc GetReplies(GetRepliesRequest) returns (Posts);
}

// Images

message VerifyUploadRequest {
  string filename = 1;
  int32 user_id = 2;
}

message ConsumeUploadRequest {
  string filename = 1;
}

message DeleteImageRequest {
  string filename = 1;
}

service ImageService {
  rpc VerifyUpload(VerifyUploadRequest) returns (Empty);
  rpc ConsumeUpload(ConsumeUploadRequest) returns (Empty);
  rpc DeleteImage(DeleteImageRequest) returns (Empty);
}
